<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HARISS AGREEMENTS</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Aptos:wght@400;700&display=swap');
:root{
  --ink:#1a2329; --paper:#f4f8fa; --line:#cedce3;
  --accent:#3b6278; --accent-dark:#243f50;
  --muted:#697e8a; --field-bg:#e9f1f5; --warn:#c24b4b;
  --overlay:rgba(20,31,38,0.65);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Aptos','Segoe UI','Calibri',Arial,sans-serif;background:#c3d4de;color:var(--ink);min-height:100vh;}
.app-bar{background:var(--accent-dark);color:#e9f1f5;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(24,38,48,.15);}
.app-bar .brand{display:flex;align-items:center;gap:10px;}
.app-bar .brand img{height:36px;width:auto;border-radius:6px;}
.app-bar h1{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#e9f1f5;}
.btn{font-family:inherit;font-size:12px;padding:8px 20px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#e9f1f5;cursor:pointer;font-weight:600;letter-spacing:.03em;transition:background .2s;}
.btn:hover{background:rgba(255,255,255,.18);}
.btn.primary{background:var(--paper);border-color:var(--paper);color:var(--accent-dark);font-weight:700;}
.btn.primary:hover{background:#fff;}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.3);}
.btn.ghost:hover{background:rgba(255,255,255,.06);}
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);padding:40px;text-align:center;}
.landing-icon{font-size:46px;margin-bottom:20px;opacity:.85;}
#landing h2{font-size:24px;color:var(--accent-dark);margin-bottom:10px;font-weight:700;}
#landing p{font-size:13px;color:var(--muted);max-width:400px;line-height:1.7;margin-bottom:30px;}
.doc-cards{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.doc-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:22px 36px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .2s;min-width:170px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.03);}
.doc-card:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(59,98,120,.12);transform:translateY(-2px);}
.doc-card.sel{border-color:var(--accent-dark);background:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,98,120,.2);}
.doc-card.sel .ct{color:#e9f1f5;opacity:.9;}
.doc-card .ci{font-size:26px;margin-bottom:10px;}
.doc-card .ct{font-size:11px;font-weight:700;color:var(--accent-dark);text-transform:uppercase;letter-spacing:.08em;}
.modal-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--paper);border-radius:12px;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(20,31,38,.3);overflow:hidden;}
.modal-head{background:var(--accent-dark);color:#e9f1f5;padding:20px 26px 16px;flex-shrink:0;}
.modal-head h2{font-size:15px;font-weight:700;letter-spacing:.03em;}
.modal-head .sub{font-size:12px;opacity:.7;margin-top:4px;}
.modal-steps{display:flex;gap:5px;margin-top:14px;}
.mstep{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.2);transition:background .3s;}
.mstep.done{background:rgba(255,255,255,.55);}
.mstep.active{background:#fff;}
.modal-body{padding:24px;overflow-y:auto;flex:1;}
.fsec{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 14px;padding-bottom:5px;border-bottom:1px solid var(--line);}
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--accent-dark);margin-bottom:5px;}
.field .hint{font-size:11px;color:var(--muted);margin-bottom:5px;font-style:italic;}
.field input,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;color:var(--ink);background:#fff;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,98,120,.12);}
.field.req label::after{content:" *";color:var(--warn);}
.field input.bad{border-color:var(--warn)!important;background:#fffbfb;}
.errmsg{font-size:11px;color:var(--warn);margin-top:4px;display:none;font-weight:500;}
.errmsg.show{display:block;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ei{border:1px solid var(--line);border-radius:7px;padding:14px;margin-bottom:10px;background:var(--field-bg);}
.ei-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--accent-dark);margin-bottom:10px;}
.ei-rm{background:none;border:none;color:var(--warn);cursor:pointer;font-size:13px;padding:2px 6px;font-weight:600;}
.add-ei{width:100%;padding:10px;border:1px dashed var(--line);border-radius:6px;background:transparent;font-size:13px;color:var(--accent);cursor:pointer;margin-top:2px;font-weight:500;transition:all .2s;font-family:inherit;}
.add-ei:hover{background:#ddeaf0;border-color:var(--accent);}
.modal-foot{padding:14px 24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#eef5f8;}
.step-info{font-size:12px;color:var(--muted);font-weight:500;}
#preview{display:none;padding:32px 24px;justify-content:center;}
#preview.show{display:flex;}
.sheet{background:#fff;width:794px;max-width:100%;padding:36px 48px 28px;box-shadow:0 6px 28px rgba(24,38,48,.1);font-size:11.5px;line-height:1.45;font-family:'Aptos','Segoe UI','Calibri',Arial,sans-serif;color:#1a2329;}
.memo-htable{width:100%;border-collapse:collapse;border:1px solid #1a2329;margin-bottom:8px;font-size:11px;}
.memo-htable td{border-right:1px solid #1a2329;padding:6px 10px;vertical-align:middle;}
.memo-htable td:last-child{border-right:none;}
.logo-cell{width:18%;text-align:center;}
.logo-cell img{height:36px;width:auto;border-radius:5px;}
.title-cell{width:50%;font-weight:700;line-height:1.4;font-size:11px;}
.title-cell .doc-dept{font-weight:700;font-size:11px;}
.title-cell .doc-name{font-weight:400;color:#697e8a;font-size:10.5px;margin-top:1px;}
.meta-cell{width:32%;line-height:1.6;font-size:10.5px;color:#333;}
.memo-date{text-align:right;font-size:10.5px;color:#697e8a;margin-bottom:5px;}
.memo-ft{font-size:11.5px;line-height:1.6;}
.memo-ft .k{display:inline-block;width:68px;font-weight:700;}
.mdiv{border:none;border-top:1px dashed #aaa;margin:7px 0 10px;}
.doc-body p{margin:0 0 7px;font-size:11px;line-height:1.5;}
.doc-body p.spaced{margin:0 0 10px;}
.clause-title{font-weight:700;margin:10px 0 4px;font-size:11px;color:var(--accent-dark);}
.etable{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:3px;}
.etable th,.etable td{border:1px solid #1a2329;padding:5px 8px;text-align:left;vertical-align:top;}
.etable th{background:#e9f1f5;font-weight:700;text-transform:uppercase;font-size:9.5px;letter-spacing:.04em;}
.sig-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px;}
.sig-col{max-width:520px;}
.sig-col .sig-row{margin-bottom:10px;}
.sig-col .sig-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:#697e8a;margin-bottom:1px;font-family:'Aptos','Segoe UI','Calibri',Arial,sans-serif;}
.sig-col .sig-name{font-weight:700;font-size:11px;font-family:'Aptos','Segoe UI','Calibri',Arial,sans-serif;}
.sig-col .sig-line{border-bottom:1px solid #1a2329;height:20px;margin-top:4px;}
.sig-col .sig-val{font-size:11px;font-family:'Aptos','Segoe UI','Calibri',Arial,sans-serif;}
@media print{
  .app-bar,#landing,.modal-overlay{display:none!important;}
  body{background:#fff;}
  #preview{display:flex!important;padding:0;}
  .sheet{box-shadow:none;width:100%;padding:18px 28px;}
  .memo-htable,.etable{break-inside:avoid;}
}
@media(max-width:640px){
  .sheet{padding:20px 14px;}
  .frow{grid-template-columns:1fr;}
  .sig-grid{grid-template-columns:1fr;}
}

</style>
</head>

var PREFILL = {
  orgName:          'HARISS INTERNATIONAL LIMITED',
  dept:             'IT Department',
  docTitle:         'Employee Equipment Handling Agreement',
  docNo:            'HI-IT-N03',
  revNo:            '0',
  effDate:          '16/12/2019',
  numPages:         '1',
  employerName:     'ALKAM SHAHAM',
  employerPosition: 'DEVELOPMENT & IT MANAGER'
};

var currentDoc  = 'contract';
var currentStep = 0;
var formData    = {};
var equipRows   = [];

function freshRow() {
  return { deviceType:'', brand:'', model:'', serial:'', imei:'' };
}

function selectDoc(type) {
  currentDoc = type;
  document.querySelectorAll('.doc-card').forEach(function(c){ c.classList.remove('sel'); });
  var card = document.getElementById('card-' + type);
  if (card) card.classList.add('sel');
  var btn = document.getElementById('startBtn');
  btn.style.opacity = '1';
  btn.style.pointerEvents = 'auto';
}

function getSteps() {
  return [
    {
      title: 'Employee Details',
      sub: 'Who is receiving the equipment?',
      kind: 'fields',
      fields: [
        { id:'employeeName',     label:'Employee full name',  req:true,  kind:'text' },
        { id:'employeeId',       label:'Employee ID',         req:true,  kind:'numonly' },
        { id:'employeePosition', label:'Employee position',   req:true,  kind:'text' }
      ]
    },
    {
      title: 'Agreement Date',
      sub: 'When is this agreement being made?',
      kind: 'fields',
      fields: [
        { id:'agreementDate', label:'Agreement date & time', req:false, kind:'text',
          hint:"Leave blank to auto-fill with today's date and time" }
      ]
    },
    {
      title: 'Equipment List',
      sub: 'Add all items being handed over',
      kind: 'equipment'
    },
    {
      title: 'Witness',
      sub: 'Optional — leave blank if not needed',
      kind: 'fields',
      fields: [
        { id:'witness', label:'Witness name', req:false, kind:'text' }
      ]
    }
  ];
}

function openForm() {
  if (currentDoc === 'manage') {
    window.location.href = 'equipment.html';
    return;
  }

  currentStep = 0;
  formData    = {};
  equipRows   = [freshRow()];
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function renderModal() {
  var steps  = getSteps();
  var step   = steps[currentStep];
  var total  = steps.length;
  var isLast = (currentStep === total - 1);

  document.getElementById('modalTitle').textContent = step.title;
  document.getElementById('modalSub').textContent   = step.sub;

  var dots = '';
  for (var i = 0; i < total; i++) {
    var cls = i < currentStep ? 'done' : (i === currentStep ? 'active' : '');
    dots += '<div class="mstep ' + cls + '"></div>';
  }
  document.getElementById('modalSteps').innerHTML = dots;
  document.getElementById('stepInfo').textContent  = 'Step ' + (currentStep + 1) + ' of ' + total;
  document.getElementById('btnBack').style.visibility = currentStep === 0 ? 'hidden' : 'visible';
  document.getElementById('btnNext').textContent = isLast ? '\u2714 Generate Document' : 'Next \u2192';

  if (step.kind === 'equipment') {
    renderEquipStep();
  } else {
    renderFieldStep(step);
  }
}

function renderFieldStep(step) {
  var html = '';
  step.fields.forEach(function(f) {
    var saved = formData[f.id] || '';
    var inp;
    if (f.kind === 'numonly') {
      inp = '<input type="text" inputmode="numeric" id="fi_' + f.id + '" value="' + esc(saved) + '" oninput="this.value=this.value.replace(/[^0-9]/g,\'\')">';
    } else {
      inp = '<input type="text" id="fi_' + f.id + '" value="' + esc(saved) + '">';
    }
    html += '<div class="field ' + (f.req ? 'req' : '') + '">'
          + '<label>' + f.label + '</label>'
          + (f.hint ? '<div class="hint">' + f.hint + '</div>' : '')
          + inp
          + '<div class="errmsg" id="em_' + f.id + '">This field is required.</div>'
          + '</div>';
  });
  document.getElementById('modalBody').innerHTML = html;
}

function snapshotEquip() {
  equipRows.forEach(function(row, i) {
    var dt = document.getElementById('eq_dt_' + i);
    var br = document.getElementById('eq_br_' + i);
    var mo = document.getElementById('eq_mo_' + i);
    var se = document.getElementById('eq_se_' + i);
    var im = document.getElementById('eq_im_' + i);
    if (dt) row.deviceType = dt.value;
    if (br) row.brand      = br.value;
    if (mo) row.model      = mo.value;
    if (se) row.serial     = se.value;
    if (im) row.imei       = im.value;
  });
}

function renderEquipStep() {
  var html = '<div class="fsec">Equipment items</div>';
  equipRows.forEach(function(row, i) {
    html += '<div class="ei">'
          + '<div class="ei-head">Item ' + (i + 1)
          + (equipRows.length > 1
              ? '<button class="ei-rm" onclick="removeEquip(' + i + ')">\u2715 Remove</button>'
              : '')
          + '</div>'

          + '<div class="frow">'
          + '<div class="field req"><label>Device type</label>'
          + '<input type="text" id="eq_dt_' + i + '" value="' + esc(row.deviceType) + '" >'
          + '<div class="errmsg" id="em_dt_' + i + '">Device type is required.</div></div>'

          + '<div class="field req"><label>Brand</label>'
          + '<input type="text" id="eq_br_' + i + '" value="' + esc(row.brand) + '" >'
          + '<div class="errmsg" id="em_br_' + i + '">Brand is required.</div></div>'
          + '</div>'

          + '<div class="field req"><label>Model</label>'
          + '<input type="text" id="eq_mo_' + i + '" value="' + esc(row.model) + '" >'
          + '<div class="errmsg" id="em_mo_' + i + '">Model is required.</div></div>'

          + '<div class="field"><label>Serial number <span style="font-weight:400;color:var(--muted);">(optional)</span></label>'
          + '<input type="text" id="eq_se_' + i + '" value="' + esc(row.serial) + '" placeholder="e.g. R9WR20ZL34J"></div>'

          + '<div class="field"><label>Device IMEI <span style="font-weight:400;color:var(--muted);">(optional)</span></label>'
          + '<input type="text" inputmode="numeric" maxlength="15" id="eq_im_' + i + '" value="' + esc(row.imei) + '" oninput="this.value=this.value.replace(/[^0-9]/g,\'\').slice(0,15)">'
          + '<div class="errmsg" id="em_im_' + i + '">IMEI must be exactly 15 digits.</div></div>'

          + '</div>';
  });
  html += '<button class="add-ei" onclick="addEquip()">+ Add another item</button>';
  document.getElementById('modalBody').innerHTML = html;
}



function addEquip() {
  snapshotEquip();
  equipRows.push(freshRow());
  renderEquipStep();
}

function removeEquip(i) {
  snapshotEquip();
  equipRows.splice(i, 1);
  renderEquipStep();
}

function stepNext() {
  var steps = getSteps();
  var step  = steps[currentStep];

  if (step.kind === 'equipment') {
    snapshotEquip();
    var ok = true;
    equipRows.forEach(function(row, i) {
        if (!row.deviceType.trim()) { showErr('em_dt_' + i); ok = false; } else { hideErr('em_dt_' + i); }
      if (!row.brand.trim())      { showErr('em_br_' + i); ok = false; } else { hideErr('em_br_' + i); }
      if (!row.model.trim())      { showErr('em_mo_' + i); ok = false; } else { hideErr('em_mo_' + i); }
      if (row.imei && row.imei.trim() && row.imei.trim().length !== 15) {
        showErr('em_im_' + i);
        ok = false;
      } else {
        hideErr('em_im_' + i);
      }
    });
    if (!ok) return;

  } else {
    var ok = true;
    step.fields.forEach(function(f) {
      if (!f.req) return;
      var inp = document.getElementById('fi_' + f.id);
      var v   = inp ? inp.value.trim() : '';
      if (!v) {
        if (inp) inp.classList.add('bad');
        showErr('em_' + f.id);
        ok = false;
      } else {
        if (inp) inp.classList.remove('bad');
        hideErr('em_' + f.id);
      }
    });
    if (!ok) return;
    step.fields.forEach(function(f) {
      var inp = document.getElementById('fi_' + f.id);
      if (inp) formData[f.id] = inp.value.trim();
    });
  }

  if (currentStep < steps.length - 1) {
    currentStep++;
    renderModal();
  } else {
    finalizeAndShow();
  }
}

function stepBack() {
  if (currentStep > 0) {
    currentStep--;
    renderModal();
  }
}

function showErr(id) { var e = document.getElementById(id); if (e) e.classList.add('show'); }
function hideErr(id) { var e = document.getElementById(id); if (e) e.classList.remove('show'); }

function appendGeneratedItemsToEquipmentList() {
  try {
    var saved = localStorage.getItem('harissEquipmentList');
    var existing = [];

    if (saved) {
      var parsed = JSON.parse(saved);
      if (Array.isArray(parsed)) {
        existing = parsed;
      }
    }

    var employee = (formData.employeeName || 'Unknown Employee').trim() || 'Unknown Employee';

    equipRows.forEach(function(row) {
      var itemName = [row.deviceType, row.brand, row.model].filter(Boolean).join(' - ');
      if (!itemName && row.serial) itemName = row.serial;
      if (!itemName && row.imei) itemName = row.imei;
      if (!itemName) return;

      existing.push({
        employee: employee,
        item: itemName,
        qty: 1,
        status: 'Pending'
      });
    });

    localStorage.setItem('harissEquipmentList', JSON.stringify(existing));
  } catch (err) {
    console.warn('Unable to sync generated items to equipment list:', err);
  }
}

function finalizeAndShow() {
  appendGeneratedItemsToEquipmentList();
  closeModal();
  document.getElementById('landing').style.display = 'none';
  document.getElementById('preview').classList.add('show');
  document.getElementById('sheet').innerHTML = renderContract();
  document.getElementById('appBarRight').innerHTML =
    '<div style="display:flex;gap:10px;">'
    + '<button class="btn ghost" onclick="goBack()">\u2190 New Document</button>'
    + '<button class="btn primary" onclick="window.print()">\uD83D\uDDA8 Print / Save as PDF</button>'
    + '</div>';
}

function goBack() {
  document.getElementById('preview').classList.remove('show');
  document.getElementById('landing').style.display = '';
  document.getElementById('appBarRight').innerHTML = '';
  document.querySelectorAll('.doc-card').forEach(function(c){ c.classList.remove('sel'); });
  var btn = document.getElementById('startBtn');
  btn.style.opacity = '.4';
  btn.style.pointerEvents = 'none';
  formData  = {};
  equipRows = [freshRow()];
  // deselect card
  var card = document.getElementById('card-contract');
  if (card) card.classList.remove('sel');
}

function renderContract() {
  var P = PREFILL;
  var D = formData;

  var now    = new Date();
  var nowStr = now.toLocaleDateString('en-GB', {day:'2-digit',month:'2-digit',year:'numeric'})
             + ' ' + now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var agDate = D.agreementDate || nowStr;

  var hasImei = equipRows.some(function(r){ return r.imei && r.imei.trim(); });

  var erows = equipRows.map(function(r) {
    return '<tr>'
         + '<td>' + esc(r.deviceType) + '</td>'
         + '<td>' + esc(r.brand)      + '</td>'
         + '<td>' + esc(r.model)      + '</td>'
         + '<td>' + esc(r.serial || '\u2014') + '</td>'
         + (hasImei ? '<td>' + esc(r.imei || '\u2014') + '</td>' : '')
         + '</tr>';
  }).join('');

  var imeiHeader = hasImei ? '<th>Device IMEI</th>' : '';

  return '<table class="memo-htable">'
       + '<tr>'
       + '<td class="logo-cell"><img src="' + LOGO_SRC + '" alt="HARISS International"></td>'
       + '<td class="title-cell">'
       + '<div class="doc-dept">' + esc(P.dept) + '</div>'
       + '<div class="doc-name">' + esc(P.docTitle) + '</div>'
       + '</td>'
       + '<td class="meta-cell">'
       + 'Doc NO: ' + esc(P.docNo) + '<br>'
       + 'Revision No.' + esc(P.revNo) + '<br>'
       + 'Effective Date: ' + esc(P.effDate) + '<br>'
       + 'NO.of Pages: ' + esc(P.numPages)
       + '</td>'
       + '</tr></table>'

       + '<div class="memo-date">DATE: ' + esc(nowStr) + '</div>'
       + '<div class="memo-ft"><span class="k">From:</span> IT DEPARTMENT</div>'
       + '<div class="memo-ft"><span class="k">To:</span> ' + esc(D.employeeName) + '</div>'
       + '<div class="memo-ft"><span class="k">Subject:</span> EQUIPMENT HANDOVER</div>'
       + '<hr class="mdiv">'

       + '<div class="doc-body">'
       + '<p class="spaced">This agreement made on the <strong>' + esc(agDate) + '</strong> between '
       + '<strong>HARISS INTERNATIONAL LIMITED,</strong> hereafter called the Employer, and '
       + '<strong>' + esc(D.employeeName) + '</strong> (' + esc(D.employeeId) + ') thereafter called the Employee.<br>'
       + 'Under general conditions of the mentioned herein, Employer hereby assigns to Employee all '
       + 'equipment named and identified in the Following List of Equipment, for use at such time as '
       + 'therein agreed by the Two (2) parties.</p>'

       + '<p class="spaced"><em>Employee shall only use the Equipment in a careful and proper manner '
       + 'and will comply with all laws, rules, ordinances, statutes and orders regarding the use and '
       + 'maintenance of the Equipment.</em></p>'

       + '<p class="spaced">Employee will, at Employee\'s sole expense, keep and maintain the Equipment '
       + 'clean and in good working order and repair during the equipment possession Period.<br>'
       + 'In the event the Equipment is lost or damaged beyond repair, Employee shall pay to Employer '
       + 'the replacement cost of the Equipment; in addition, the obligations of this Agreement shall '
       + 'continue in full force and effect through the equipment possession period or employment term.</p>'

       + '<div class="clause-title">LIST OF EQUIPMENT:</div>'
       + '<table class="etable">'
       + '<thead><tr><th>Device Type</th><th>Brand Name</th><th>Device Model</th><th>Serial Number</th>' + imeiHeader + '</tr></thead>'
       + '<tbody>' + erows + '</tbody>'
       + '</table>'

       + '<p style="margin-top:9px;">In WITNESS WHEREOF, the parties have caused this Agreement '
       + 'to be executed the day and year first above written.</p>'

       + '<div class="sig-grid">'

       + '<div class="sig-col">'
       + '<div class="sig-row"><div class="sig-label">Employer Name</div><div class="sig-name">' + esc(P.employerName) + '</div></div>'
       + '<div class="sig-row"><div class="sig-label">(Position, if Applicable)</div><div class="sig-val">' + esc(P.employerPosition) + '</div></div>'
       + '<div class="sig-row"><div class="sig-label">(Signature)</div><div class="sig-line"></div></div>'
       + '<div class="sig-row"><div class="sig-label">Employee Name</div><div class="sig-name">' + esc(D.employeeName) + '</div></div>'
       + '<div class="sig-row"><div class="sig-label">(Position, if Applicable)</div><div class="sig-val">' + esc(D.employeePosition || '') + '</div></div>'
       + '<div class="sig-row"><div class="sig-label">(Return Date)</div><div class="sig-val"></div></div>'
       + '<div class="sig-row"><div class="sig-label">Witness</div><div class="sig-val">' + (D.witness ? esc(D.witness) : '') + '</div></div>'
       + '</div>'

       + '</div>'
       + '</div>';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

</script>
